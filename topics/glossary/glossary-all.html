<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossary All Terms - Rotary Flight Mission</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/themes.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/quiz.css">
</head>
<body class="theme-glossary">
  <div class="page-wrapper">
    <nav class="top-nav sticky-nav" id="top-nav"></nav>
    <div class="breadcrumbs" id="breadcrumbs"></div>
    <main class="main-content" id="main-content">
      <section class="hero hero-page">
        <div class="container hero-inner">
          <div class="hero-icon">📚</div>
          <div>
            <h1>Glossary — All Terms</h1>
            <p class="lead">Every term in the Rotary Flight Mission, A to Z.</p>
          </div>
        </div>
      </section>
      <div class="container section">
        <div class="topic-layout">
          <aside id="side-nav"></aside>
          <div>
            <div class="card card-blue">
              <div class="flex gap-2 flex-wrap">
                <a href="glossary-all.html" class="btn btn-sm btn-primary">All</a>
                <a href="glossary-a-f.html" class="btn btn-sm btn-secondary">A-F</a>
                <a href="glossary-g-l.html" class="btn btn-sm btn-secondary">G-L</a>
                <a href="glossary-m-r.html" class="btn btn-sm btn-secondary">M-R</a>
                <a href="glossary-s-z.html" class="btn btn-sm btn-secondary">S-Z</a>
              </div>
              <div class="flex gap-2 flex-wrap mt-3 items-center">
                <span style="font-size:0.85rem;color:var(--steel-gray);font-weight:600">Sort:</span>
                <button class="btn btn-sm btn-primary" id="sort-alpha">A-Z</button>
                <button class="btn btn-sm btn-secondary" id="sort-random">Random</button>
              </div>
              <input type="text" placeholder="Search terms..." class="mt-3" style="width:100%;padding:var(--space-3);border-radius:var(--radius-md);border:2px solid var(--soft-background);font-family:inherit" id="glossary-search">
            </div>
            <div class="vocab-grid mt-5" id="glossary-content" data-range="all"></div>
          </div>
        </div>
      </div>
    </main>
    <footer class="page-footer">
      <div class="container flex justify-between items-center flex-wrap gap-3">
        <div>Rotary Flight Mission</div>
        <div class="flex gap-4"><a href="../../index.html">Home</a><a href="../../study-path.html">Study Path</a></div>
      </div>
    </footer>
  </div>
  <script src="../../assets/js/app-shell.js"></script>
  <script src="../../assets/js/navigation.js"></script>
  <script src="../../assets/js/progress.js"></script>
  <script src="../../assets/js/glossary.js"></script>
  <script src="../../assets/js/accessibility.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Glossary.init();
      const search = document.getElementById('glossary-search');
      search.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('.vocab-card').forEach(card => {
          const term = card.dataset.term || '';
          card.style.display = term.includes(q) ? 'block' : 'none';
        });
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Quiz: Medium - Rotary Flight Mission</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/themes.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/quiz.css">
</head>
<body class="theme-olympiad">
  <div class="page-wrapper">
    <nav class="top-nav sticky-nav" id="top-nav"></nav>
    <div class="breadcrumbs" id="breadcrumbs"></div>
    <main class="main-content" id="main-content">
      <section class="hero hero-page">
        <div class="container hero-inner">
          <div class="hero-icon">📝</div>
          <div>
            <h1>Practice Quiz: Medium</h1>
            <p class="lead">Step up the challenge with mixed concepts.</p>
            <div class="hero-meta">
              <span class="tag tag-core">Core</span>
              <span class="tag" style="background:var(--soft-background);color:var(--steel-gray)">⏱ 15 min</span>
            </div>
          </div>
        </div>
      </section>
      <div class="container section">
        <div class="topic-layout">
          <aside id="side-nav"></aside>
          <div>
            <div class="callout callout-mission">
              <div class="callout-icon">🎯</div>
              <div><strong>Why this matters</strong><p class="mt-2">Medium quizzes mix history, science, and aircraft types. They prepare you for the format of real competitions.</p></div>
            </div>
            <div class="quiz-container" id="quiz-container" data-quiz-id="practice-quiz-medium"></div>
          </div>
        </div>
      </div>
    </main>
    <footer class="page-footer">
      <div class="container flex justify-between items-center flex-wrap gap-3">
        <div>Rotary Flight Mission</div>
        <div class="flex gap-4"><a href="../../index.html">Home</a><a href="../../study-path.html">Study Path</a></div>
      </div>
    </footer>
  </div>
  <script src="../../assets/js/app-shell.js"></script>
  <script src="../../assets/js/navigation.js"></script>
  <script src="../../assets/js/progress.js"></script>
  <script src="../../assets/js/glossary.js"></script>
  <script src="../../assets/js/quizzes.js"></script>
  <script src="../../assets/js/accessibility.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Navigation.renderTopicFooter('practice-quiz-medium');
      let questions = [];
      try {
        const res = await fetch('../../assets/data/quizzes.json');
        const data = await res.json();
        questions = data['practice-quiz-medium'] || [];
      } catch (e) {
        questions = [
          { question: 'In a single-rotor helicopter, what balances main rotor torque?', type: 'multiple_choice', options: ['Bigger engine','Tail rotor','Extra weight','Wing flaps'], correct: 1, explanation: 'Tail rotor provides anti-torque thrust.' },
          { question: 'What happens when angle of attack becomes too high?', type: 'multiple_choice', options: ['Lift keeps increasing','Drag decreases','The blade can stall','The engine stops'], correct: 2, explanation: 'Too high angle disrupts airflow.' },
          { question: 'Which aircraft type uses two rotors spinning in opposite directions on the same axis?', type: 'multiple_choice', options: ['Tandem rotor','Coaxial rotor','Tiltrotor','Autogyro'], correct: 1, explanation: 'Coaxial rotors are stacked and counter-rotate.' },
          { question: 'Autorotation is used when:', type: 'multiple_choice', options: ['The engine fails','Taking off','Flying fast','Refueling'], correct: 0, explanation: 'Autorotation is for engine-out emergencies.' }
        ];
      }
      QuizEngine.init('quiz-container');
      QuizEngine.loadQuiz(questions);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Quiz: Easy - Rotary Flight Mission</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/themes.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/quiz.css">
</head>
<body class="theme-olympiad">
  <div class="page-wrapper">
    <nav class="top-nav sticky-nav" id="top-nav"></nav>
    <div class="breadcrumbs" id="breadcrumbs"></div>
    <main class="main-content" id="main-content">
      <section class="hero hero-page">
        <div class="container hero-inner">
          <div class="hero-icon">📝</div>
          <div>
            <h1>Practice Quiz: Easy</h1>
            <p class="lead">Build confidence with 10 starter questions.</p>
            <div class="hero-meta">
              <span class="tag tag-starter">Starter</span>
              <span class="tag" style="background:var(--soft-background);color:var(--steel-gray)">⏱ 10 min</span>
            </div>
          </div>
        </div>
      </section>
      <div class="container section">
        <div class="topic-layout">
          <aside id="side-nav"></aside>
          <div>
            <div class="callout callout-mission">
              <div class="callout-icon">🎯</div>
              <div><strong>Why this matters</strong><p class="mt-2">Easy quizzes build confidence and help you memorize core facts. Aim for 100% before moving to medium.</p></div>
            </div>
            <div class="quiz-container" id="quiz-container" data-quiz-id="practice-quiz-easy"></div>
          </div>
        </div>
      </div>
    </main>
    <footer class="page-footer">
      <div class="container flex justify-between items-center flex-wrap gap-3">
        <div>Rotary Flight Mission</div>
        <div class="flex gap-4"><a href="../../index.html">Home</a><a href="../../study-path.html">Study Path</a></div>
      </div>
    </footer>
  </div>
  <script src="../../assets/js/app-shell.js"></script>
  <script src="../../assets/js/navigation.js"></script>
  <script src="../../assets/js/progress.js"></script>
  <script src="../../assets/js/glossary.js"></script>
  <script src="../../assets/js/quizzes.js"></script>
  <script src="../../assets/js/accessibility.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Navigation.renderTopicFooter('practice-quiz-easy');
      let questions = [];
      try {
        const res = await fetch('../../assets/data/quizzes.json');
        const data = await res.json();
        questions = data['practice-quiz-easy'] || [];
      } catch (e) {
        questions = [
          { question: 'Which aircraft uses rotating blades to create lift?', type: 'multiple_choice', options: ['Airplane','Helicopter','Glider','Balloon'], correct: 1, explanation: 'Helicopters use rotors for lift.' },
          { question: 'A helicopter must use a runway.', type: 'true_false', correct: false, explanation: 'Helicopters can do VTOL.' },
          { question: 'What does VTOL stand for?', type: 'multiple_choice', options: ['Very Tall Object Lifter','Vertical Takeoff and Landing','Variable Thrust','Vector Tilt'], correct: 1, explanation: 'VTOL = Vertical Takeoff and Landing.' },
          { question: 'Which force pulls downward?', type: 'multiple_choice', options: ['Lift','Thrust','Drag','Weight'], correct: 3, explanation: 'Weight is the downward gravitational force.' },
          { question: 'The tail rotor prevents the body from spinning.', type: 'true_false', correct: true, explanation: 'It counters torque.' },
          { question: 'Hovering means:', type: 'multiple_choice', options: ['Flying fast','Staying in one place','Landing quickly','Taking off'], correct: 1, explanation: 'Hovering = stationary in the air.' },
          { question: 'An autogyro is the same as a helicopter.', type: 'true_false', correct: false, explanation: 'Autogyros have unpowered rotors.' },
          { question: 'Which control changes all blade angles?', type: 'multiple_choice', options: ['Cyclic','Collective','Rudder','Throttle'], correct: 1, explanation: 'Collective changes all blades equally.' },
          { question: 'Who is a famous helicopter pioneer?', type: 'multiple_choice', options: ['Wright Brothers','Igor Sikorsky','Amelia Earhart','Charles Lindbergh'], correct: 1, explanation: 'Sikorsky developed the VS-300.' },
          { question: 'A tiltrotor can fly like a helicopter and an airplane.', type: 'true_false', correct: true, explanation: 'Tiltrotors combine both capabilities.' }
        ];
      }
      QuizEngine.init('quiz-container');
      QuizEngine.loadQuiz(questions);
    });
  </script>
</body>
</html>

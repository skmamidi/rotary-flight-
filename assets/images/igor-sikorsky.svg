<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="100%" height="100%">
    <defs>
        <!-- Gradients and Patterns -->
        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f0ece6" />
            <stop offset="100%" stop-color="#dcd5cc" />
        </linearGradient>
        
        <linearGradient id="suit-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2e343b" />
            <stop offset="100%" stop-color="#16191c" />
        </linearGradient>

        <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-gradient)" />
    
    <!-- Vintage Border -->
    <rect x="20" y="20" width="560" height="660" fill="none" stroke="#c0b5a7" stroke-width="2" />
    <rect x="28" y="28" width="544" height="644" fill="none" stroke="#c0b5a7" stroke-width="1" />

    <!-- Subtle Background Watermark (VS-300 Abstract Silhouette) -->
    <g opacity="0.06" stroke="#1a1c1e" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(100, 120) scale(0.6)">
        <path d="M 250,420 L 580,420 M 580,420 L 880,380 M 580,420 L 680,440 L 580,460 L 350,460 Z" />
        <rect x="500" y="340" width="80" height="80" rx="8" />
        <rect x="532" y="160" width="16" height="120" />
        <path d="M 500,160 C 300,165 100,170 50,170 M 580,160 C 750,165 950,170 1000,170" />
        <circle cx="890" cy="390" r="12" />
        <line x1="890" y1="330" x2="890" y2="450" />
    </g>

    <!-- PORTRAIT GROUP -->
    <g filter="url(#drop-shadow)" transform="translate(0, 10)">
        
        <!-- Suit Shoulders & Torso -->
        <path d="M 80,700 L 150,560 C 180,520 240,520 260,560 L 300,660 L 340,560 C 360,520 420,520 450,560 L 520,700 Z" fill="url(#suit-gradient)"/>
        
        <!-- Suit Lapels & Shadows -->
        <path d="M 260,560 L 300,700 L 140,700 L 150,560 Z" fill="#1c2025" opacity="0.6"/>
        <path d="M 340,560 L 300,700 L 460,700 L 450,560 Z" fill="#1c2025" opacity="0.6"/>
        <path d="M 240,580 L 300,680 L 190,700 Z" fill="#22272c"/>
        <path d="M 360,580 L 300,680 L 410,700 Z" fill="#22272c"/>

        <!-- Shirt -->
        <path d="M 260,560 L 300,650 L 340,560 C 310,540 290,540 260,560 Z" fill="#f2f4f5"/>
        <path d="M 300,650 L 340,560 C 310,540 300,560 300,650 Z" fill="#e0e4e8"/> <!-- Shirt shadow -->

        <!-- Tie -->
        <polygon points="288,610 312,610 325,700 275,700" fill="#722f37"/>
        <polygon points="285,580 315,580 312,610 288,610" fill="#522026"/>
        
        <!-- Neck -->
        <rect x="250" y="500" width="100" height="70" fill="#c79172"/>
        <rect x="250" y="500" width="100" height="70" fill="#a87053" opacity="0.5"/> <!-- Deep neck shadow -->
        <path d="M 270,500 L 330,500 L 300,540 Z" fill="#c79172"/> <!-- Adam's apple base -->

        <!-- Hair (Grey/White Sides) -->
        <path d="M 200,310 C 160,370 170,430 210,460 L 220,310 Z" fill="#d5d8dc"/>
        <path d="M 400,310 C 440,370 430,430 390,460 L 380,310 Z" fill="#d5d8dc"/>
        <path d="M 195,330 C 165,380 175,420 205,445 Z" fill="#bdc3c7"/> <!-- Hair depth -->
        <path d="M 405,330 C 435,380 425,420 395,445 Z" fill="#bdc3c7"/> 

        <!-- Ears -->
        <path d="M 210,360 C 180,360 170,400 180,440 C 190,460 210,450 210,430 Z" fill="#c79172"/>
        <path d="M 390,360 C 420,360 430,400 420,440 C 410,460 390,450 390,430 Z" fill="#c79172"/>
        <path d="M 200,380 C 190,390 190,410 200,420" stroke="#a87053" stroke-width="4" stroke-linecap="round" fill="none"/> <!-- Ear detail -->
        <path d="M 400,380 C 410,390 410,410 400,420" stroke="#a87053" stroke-width="4" stroke-linecap="round" fill="none"/>

        <!-- Face Base Silhouette -->
        <path d="M 210,340 C 210,490 240,550 300,560 C 360,550 390,490 390,340 C 390,240 350,210 300,210 C 250,210 210,240 210,340 Z" fill="#e6b999"/>
        
        <!-- Structural Face Shadows (Cheekbones & Jaw) -->
        <!-- Left Cheek/Jaw Shadow -->
        <path d="M 210,370 C 240,430 250,480 270,520 C 230,480 220,420 210,370 Z" fill="#c79172"/>
        <!-- Right Cheek/Jaw Shadow -->
        <path d="M 390,370 C 360,430 350,480 330,520 C 370,480 380,420 390,370 Z" fill="#c79172"/>
        <!-- Deep cheek hollows -->
        <path d="M 230,410 C 260,440 260,460 270,480 C 240,450 240,430 230,410 Z" fill="#a87053" opacity="0.6"/>
        <path d="M 370,410 C 340,440 340,460 330,480 C 360,450 360,430 370,410 Z" fill="#a87053" opacity="0.6"/>
        <!-- Chin Shadow -->
        <path d="M 270,535 C 290,555 310,555 330,535 C 310,545 290,545 270,535 Z" fill="#c79172"/>
        <path d="M 285,515 C 300,525 315,515 300,520 Z" fill="#a87053"/> <!-- Chin dimple/crease -->

        <!-- Nose -->
        <!-- Nose Bridge Shadow -->
        <path d="M 300,310 L 275,445 C 275,470 325,470 325,445 L 300,310 Z" fill="#c79172"/>
        <!-- Nose Highlight -->
        <path d="M 300,310 L 290,440 C 290,455 310,455 305,440 L 300,310 Z" fill="#f5cdb1"/>
        <!-- Nostrils -->
        <path d="M 270,450 C 285,445 290,455 285,465 C 270,465 260,455 270,450 Z" fill="#a87053"/>
        <path d="M 330,450 C 315,445 310,455 315,465 C 330,465 340,455 330,450 Z" fill="#a87053"/>

        <!-- Eyes (Deep Set) -->
        <!-- Sockets / Eye Bags -->
        <ellipse cx="255" cy="345" rx="30" ry="18" fill="#c79172"/>
        <ellipse cx="345" cy="345" rx="30" ry="18" fill="#c79172"/>
        <path d="M 230,365 C 250,380 270,370 280,360" stroke="#a87053" stroke-width="2" fill="none"/> <!-- Left bag -->
        <path d="M 370,365 C 350,380 330,370 320,360" stroke="#a87053" stroke-width="2" fill="none"/> <!-- Right bag -->
        
        <!-- Sclera (Whites) -->
        <path d="M 230,350 C 255,335 275,350 260,360 C 245,365 230,355 230,350 Z" fill="#f2f4f5"/>
        <path d="M 370,350 C 345,335 325,350 340,360 C 355,365 370,355 370,350 Z" fill="#f2f4f5"/>
        
        <!-- Irises & Pupils -->
        <circle cx="252" cy="348" r="7" fill="#34495e"/>
        <circle cx="348" cy="348" r="7" fill="#34495e"/>
        <circle cx="252" cy="348" r="3.5" fill="#1a1c1e"/>
        <circle cx="348" cy="348" r="3.5" fill="#1a1c1e"/>
        
        <!-- Eye Highlights -->
        <circle cx="255" cy="345" r="2" fill="#ffffff"/>
        <circle cx="351" cy="345" r="2" fill="#ffffff"/>
        
        <!-- Upper Eyelid Creases -->
        <path d="M 225,335 C 250,325 275,335 285,345" stroke="#a87053" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 375,335 C 350,325 325,335 315,345" stroke="#a87053" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- Bushy Grey Eyebrows -->
        <path d="M 215,325 C 240,310 270,315 285,330" stroke="#e0e0e0" stroke-width="9" stroke-linecap="round" fill="none"/>
        <path d="M 215,325 C 240,310 270,315 285,330" stroke="#bdc3c7" stroke-width="4" stroke-linecap="round" fill="none"/> <!-- Brow texture -->
        <path d="M 385,325 C 360,310 330,315 315,330" stroke="#e0e0e0" stroke-width="9" stroke-linecap="round" fill="none"/>
        <path d="M 385,325 C 360,310 330,315 315,330" stroke="#bdc3c7" stroke-width="4" stroke-linecap="round" fill="none"/>

        <!-- Crows Feet / Wrinkles -->
        <path d="M 220,355 C 210,360 210,365 225,370" stroke="#c79172" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 380,355 C 390,360 390,365 375,370" stroke="#c79172" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Nasolabial Folds (Smile Lines) -->
        <path d="M 260,420 C 250,450 245,470 250,490" stroke="#c79172" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 340,420 C 350,450 355,470 350,490" stroke="#c79172" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- Mouth & Lips -->
        <!-- Lower lip visible under mustache -->
        <path d="M 275,515 C 300,525 320,515 300,510 Z" fill="#d29b7f"/>
        <path d="M 275,510 C 290,518 310,518 325,510" stroke="#a87053" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- Signature Mustache -->
        <!-- Mustache Base Shadow -->
        <path d="M 255,498 C 280,488 320,488 345,498 C 355,510 335,515 300,510 C 265,515 245,510 255,498 Z" fill="#bdc3c7"/>
        <!-- Mustache Main -->
        <path d="M 250,485 C 280,475 320,475 350,485 C 360,500 335,505 300,500 C 265,505 240,500 250,485 Z" fill="#e0e0e0"/>
        <!-- Mustache Texture Lines -->
        <path d="M 270,485 L 265,500 M 290,480 L 285,500 M 310,480 L 315,500 M 330,485 L 335,500" stroke="#bdc3c7" stroke-width="1.5" stroke-linecap="round" fill="none"/>

        <!-- THE ICONIC FEDORA HAT -->
        <g id="fedora-hat">
            <!-- Back Brim -->
            <ellipse cx="300" cy="270" rx="160" ry="35" fill="#2d1e16"/>
            
            <!-- Hat Crown Base -->
            <path d="M 180,260 C 180,100 230,70 300,70 C 370,70 420,100 420,260 Z" fill="#3e2723"/>
            
            <!-- Crown Details (Dents and Highlights) -->
            <!-- Left Highlight -->
            <path d="M 180,260 C 180,100 230,70 300,70 C 250,80 210,130 200,260 Z" fill="#4a312c"/>
            <!-- Top Crease/Indent -->
            <path d="M 240,85 C 280,120 320,120 360,85 C 330,140 270,140 240,85 Z" fill="#2d1e16"/>
            <!-- Side Pinches -->
            <path d="M 210,160 C 240,150 250,190 240,250 C 200,250 200,190 210,160 Z" fill="#2d1e16" opacity="0.8"/>
            <path d="M 390,160 C 360,150 350,190 360,250 C 400,250 400,190 390,160 Z" fill="#2d1e16" opacity="0.8"/>
            
            <!-- Hat Band (Black Ribbon) -->
            <path d="M 178,250 C 240,275 360,275 422,250 L 420,268 C 360,293 240,293 180,268 Z" fill="#1a110c"/>
            <path d="M 178,250 C 240,275 360,275 422,250 L 421,255 C 360,280 240,280 179,255 Z" fill="#261a14"/> <!-- Ribbon highlight -->
            
            <!-- Front Brim -->
            <path d="M 90,280 C 180,330 420,330 510,280 C 540,295 470,365 300,365 C 130,365 60,295 90,280 Z" fill="#3e2723"/>
            <!-- Front Brim Edge Highlight -->
            <path d="M 100,285 C 190,330 410,330 500,285 C 470,345 300,355 130,345 Z" fill="#543833"/>
            
            <!-- Drop Shadow Cast by Hat onto the Face -->
            <path d="M 205,305 C 240,330 360,330 395,305 L 395,335 C 360,365 240,365 205,335 Z" fill="#8a5a40" opacity="0.75" style="mix-blend-mode: multiply;"/>
        </g>
    </g>

    <!-- Nameplate / Title -->
    <g transform="translate(0, 20)">
        <!-- Elegant separator line -->
        <line x1="200" y1="590" x2="400" y2="590" stroke="#ffffff" stroke-width="1" opacity="0.3" />
        
        <!-- Text -->
        <text x="300" y="625" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="6">IGOR SIKORSKY</text>
        <text x="300" y="645" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle" letter-spacing="3">1889 - 1972</text>
    </g>

</svg>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/themes.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/quiz.css">
</head>
<body class="theme-olympiad">
  <div class="page-wrapper">
    <nav class="top-nav sticky-nav" id="top-nav"></nav>
    <div class="breadcrumbs" id="breadcrumbs"></div>
    <main class="main-content" id="main-content">
      <section class="hero hero-page">
        <div class="container hero-inner">
          <div class="hero-icon">🏆</div>
          <div>
            <h1>State-Level Mock Test</h1>
            <p class="lead">The ultimate challenge. 25 questions covering everything.</p>
            <div class="hero-meta">
              <span class="tag tag-olympiad">Olympiad</span>
              <span class="tag" style="background:var(--soft-background);color:var(--steel-gray)">⏱ 25 min</span>
            </div>
          </div>
        </div>
      </section>
      <div class="container section">
        <div class="topic-layout">
          <aside id="side-nav"></aside>
          <div>
            <div class="callout callout-mission">
              <div class="callout-icon">🎯</div>
              <div><strong>Why this matters</strong><p class="mt-2">This is the closest simulation to a real competition. It mixes vocabulary, flight science, aircraft types, history, and applications.</p></div>
            </div>
            <div class="quiz-container" id="quiz-container" data-quiz-id="state-level-mock-test"></div>
          </div>
        </div>
      </div>
    </main>
    <footer class="page-footer">
      <div class="container flex justify-between items-center flex-wrap gap-3">
        <div>Rotary Flight Mission</div>
        <div class="flex gap-4"><a href="../../index.html">Home</a><a href="../../study-path.html">Study Path</a></div>
      </div>
    </footer>
  </div>
  <script src="../../assets/js/app-shell.js"></script>
  <script src="../../assets/js/navigation.js"></script>
  <script src="../../assets/js/progress.js"></script>
  <script src="../../assets/js/glossary.js"></script>
  <script src="../../assets/js/quizzes.js"></script>
  <script src="../../assets/js/accessibility.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Navigation.renderTopicFooter('state-level-mock-test');
      let questions = [];
      try {
        const res = await fetch('../../assets/data/quizzes.json');
        const data = await res.json();
        questions = data['state-level-mock-test'] || [];
      } catch (e) {
        questions = [
          { question: 'Which aircraft CANNOT hover?', type: 'multiple_choice', options: ['Helicopter','Tiltrotor','Autogyro','Tandem rotor'], correct: 2, explanation: 'Autogyros cannot hover.' },
          { question: 'What does cyclic control do?', type: 'multiple_choice', options: ['Changes all blade angles','Tilts rotor disk for direction','Starts engine','Controls fuel'], correct: 1, explanation: 'Cyclic tilts the rotor disk.' },
          { question: 'The VS-300 first flew in 1939.', type: 'true_false', correct: true, explanation: 'Correct.' },
          { question: 'Torque is caused by:', type: 'multiple_choice', options: ['Air resistance','Rotor spinning','Too much weight','Engine heat'], correct: 1, explanation: 'Rotor action creates opposite reaction torque.' },
          { question: 'A tiltrotor in forward flight has nacelles:', type: 'multiple_choice', options: ['Vertical','Horizontal','At 45 degrees','Removed'], correct: 1, explanation: 'Forward flight = horizontal nacelles.' },
          { question: 'Autorotation is used when the engine fails.', type: 'true_false', correct: true, explanation: 'Autorotation is an emergency descent.' },
          { question: 'Which control changes total lift?', type: 'multiple_choice', options: ['Cyclic','Collective','Rudder','Throttle'], correct: 1, explanation: 'Collective changes all blades equally.' },
          { question: 'An autogyro uses a propeller for:', type: 'multiple_choice', options: ['Lift','Forward thrust','Braking','Steering'], correct: 1, explanation: 'Propeller provides thrust; rotor provides lift from airflow.' },
          { question: 'Coaxial rotors cancel torque by:', type: 'multiple_choice', options: ['Spinning opposite directions','Being very large','Using jets','Adding weight'], correct: 0, explanation: 'Counter-rotation cancels torque.' },
          { question: 'Hovering requires:', type: 'multiple_choice', options: ['No pilot input','Lift equal to weight with active control','A runway','Very fast speed'], correct: 1, explanation: 'Hovering is active balance.' }
        ];
      }
      QuizEngine.init('quiz-container');
      QuizEngine.loadQuiz(questions);
    });
  </script>
</body>
</html>

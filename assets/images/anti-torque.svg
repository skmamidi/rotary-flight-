<svg id="main-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="100%" height="100%" onload="initSimulation()" onmousemove="onMouseMove(event)" onmouseup="onMouseUp(event)" onmouseleave="onMouseUp(event)" style="user-select: none; -webkit-user-select: none;">
    <style>
        .bg { fill: #f8fafc; }
        
        /* Typography */
        text { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
        .title { font-size: 32px; font-weight: 900; fill: #0f172a; letter-spacing: 1px; }
        .subtitle { font-size: 16px; font-weight: 600; fill: #64748b; letter-spacing: 1px; text-transform: uppercase; }
        
        /* Tabs */
        .tab { cursor: pointer; transition: all 0.2s ease; }
        .tab-bg { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; transition: all 0.3s ease; }
        .tab-text { font-size: 15px; font-weight: 800; fill: #64748b; text-anchor: middle; transition: all 0.2s ease; pointer-events: none; }
        
        .tab:hover .tab-bg { stroke: #94a3b8; }
        .tab.active .tab-bg { fill: #e11d48; stroke: #e11d48; }
        .tab.active .tab-text { fill: #ffffff; }

        /* Helicopter Graphics */
        .heli-body { fill: #e2e8f0; stroke: #475569; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
        .heli-glass { fill: #bae6fd; stroke: #475569; stroke-width: 3; }
        .heli-dark { fill: #94a3b8; stroke: #475569; stroke-width: 3; }
        .heli-blade { stroke: #334155; stroke-width: 6; stroke-linecap: round; }
        .heli-rotor-disc { fill: rgba(148, 163, 184, 0.1); stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 8; }
        
        /* Forces and Labels */
        .force-torque { fill: none; stroke: #3b82f6; stroke-width: 6; marker-end: url(#arrow-torque); }
        .force-reaction { fill: none; stroke: #ef4444; stroke-width: 6; marker-end: url(#arrow-reaction); }
        .force-anti { fill: none; stroke: #10b981; stroke-width: 8; stroke-linecap: round; marker-end: url(#arrow-anti); }
        
        .label-torque { font-size: 13px; font-weight: 800; fill: #3b82f6; }
        .label-reaction { font-size: 13px; font-weight: 800; fill: #ef4444; }
        .label-anti { font-size: 13px; font-weight: 800; fill: #059669; }

        /* Panels and Sliders */
        .panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; rx: 12; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05)); }
        .slider-hitbox { fill: transparent; cursor: pointer; }
        .slider-track { stroke: #f1f5f9; stroke-width: 10; stroke-linecap: round; }
        .slider-fill { stroke-width: 10; stroke-linecap: round; pointer-events: none; }
        .slider-thumb { fill: #ffffff; stroke-width: 3; pointer-events: none; }
    </style>

    <defs>
        <marker id="arrow-torque" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" /></marker>
        <marker id="arrow-reaction" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
        <marker id="arrow-anti" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" /></marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" class="bg" />

    <!-- Header -->
    <g transform="translate(50, 50)">
        <text x="0" y="0" class="title">Anti-Torque Engineering</text>
        <text x="0" y="25" class="subtitle">Solving Newton's Third Law in Rotary Flight</text>
    </g>

    <!-- Mode Tabs -->
    <g transform="translate(580, 40)">
        <g id="tab-tail" class="tab active" onclick="setMode('tail')">
            <rect x="0" y="0" width="180" height="40" class="tab-bg" />
            <text x="90" y="26" class="tab-text">TAIL ROTOR</text>
        </g>
        <g id="tab-coaxial" class="tab" onclick="setMode('coaxial')" transform="translate(195, 0)">
            <rect x="0" y="0" width="180" height="40" class="tab-bg" />
            <text x="90" y="26" class="tab-text">COAXIAL</text>
        </g>
        <g id="tab-tandem" class="tab" onclick="setMode('tandem')" transform="translate(390, 0)">
            <rect x="0" y="0" width="180" height="40" class="tab-bg" />
            <text x="90" y="26" class="tab-text">TANDEM</text>
        </g>
    </g>

    <!-- SIMULATION AREA -->
    <rect x="50" y="110" width="670" height="520" class="panel" />
    
    <g transform="translate(385, 370)">
        <!-- 1. TAIL ROTOR VIEW -->
        <g id="view-tail" display="block">
            <g id="heli-tail-group">
                <path d="M -60,0 L -220,-5 L -220,5 Z" class="heli-body" />
                <ellipse cx="-20" cy="0" rx="90" ry="45" class="heli-body" />
                <path d="M 10,-35 C 50,-35 70,-20 70,0 C 70,20 50,35 10,35 Z" class="heli-glass" />
                <rect x="-230" y="-30" width="15" height="60" class="heli-dark" />
                <g id="tail-rotor-anim" transform="translate(-222, 0)"><line x1="0" y1="-25" x2="0" y2="25" class="heli-blade" stroke-width="4" /></g>
                <!-- Tail Force -->
                <line id="vec-tail-force" x1="-222" y1="0" x2="-222" y2="-60" class="force-anti" />
                <text x="-230" y="-75" class="label-anti" text-anchor="middle">ANTI-TORQUE THRUST</text>
                <!-- Reaction -->
                <path d="M 0,60 A 60 60 0 0 0 60,0" class="force-reaction" />
                <text x="55" y="75" class="label-reaction">TORQUE REACTION</text>
                <!-- Main Rotor -->
                <circle cx="0" cy="0" r="210" class="heli-rotor-disc" />
                <g id="main-rotor-tail"><line x1="-200" y1="0" x2="200" y2="0" class="heli-blade" /></g>
                <path d="M 0,-70 A 70 70 0 0 0 -70,0" class="force-torque" />
            </g>
        </g>

        <!-- 2. COAXIAL VIEW -->
        <g id="view-coaxial" display="none">
            <g id="heli-coaxial-group">
                <ellipse cx="0" cy="0" rx="90" ry="50" class="heli-body" />
                <path d="M 30,-40 C 70,-40 90,-20 90,0 C 90,20 70,40 30,40 Z" class="heli-glass" />
                <rect x="-100" y="-15" width="20" height="30" class="heli-dark" />
                <!-- Upper Rotor CW -->
                <circle cx="0" cy="0" r="230" class="heli-rotor-disc" />
                <g id="rotor-coax-1"><line x1="-220" y1="0" x2="220" y2="0" class="heli-blade" stroke="#3b82f6" /></g>
                <path d="M 0,-80 A 80 80 0 0 0 -80,0" class="force-torque" />
                <text x="-125" y="-85" class="label-torque">TORQUE 1 (CW)</text>
                <!-- Lower Rotor CCW -->
                <g id="rotor-coax-2"><line x1="-220" y1="0" x2="220" y2="0" class="heli-blade" stroke="#10b981" opacity="0.8" /></g>
                <path d="M 0,80 A 80 80 0 0 1 -80,0" class="force-anti" />
                <text x="-140" y="85" class="label-anti">TORQUE 2 (CCW)</text>
                <text x="0" y="140" class="label-anti" text-anchor="middle">FORCES CANCEL INTERNALLY</text>
            </g>
        </g>

        <!-- 3. TANDEM VIEW -->
        <g id="view-tandem" display="none">
            <g id="heli-tandem-group">
                <!-- Body -->
                <path d="M -160,-25 L 160,-25 C 190,-25 190,25 160,25 L -160,25 C -190,25 -190,-25 -160,-25 Z" class="heli-body" />
                <path d="M 140,-15 L 180,-15 L 180,15 L 140,15 Z" class="heli-glass" />
                
                <!-- Front Rotor CCW -->
                <g transform="translate(150, 0)">
                    <circle cx="0" cy="0" r="140" class="heli-rotor-disc" />
                    <g id="rotor-tan-front"><line x1="-130" y1="0" x2="130" y2="0" class="heli-blade" /></g>
                    <path d="M 0,60 A 60 60 0 0 1 -60,0" class="force-anti" />
                    <text x="-50" y="75" class="label-anti" text-anchor="middle">TORQUE CCW</text>
                </g>

                <!-- Rear Rotor CW -->
                <g transform="translate(-150, 0)">
                    <circle cx="0" cy="0" r="140" class="heli-rotor-disc" />
                    <g id="rotor-tan-rear"><line x1="-130" y1="0" x2="130" y2="0" class="heli-blade" /></g>
                    <path d="M 0,-60 A 60 60 0 0 0 -60,0" class="force-torque" />
                    <text x="-50" y="-70" class="label-torque" text-anchor="middle">TORQUE CW</text>
                </g>
                <text x="0" y="110" class="label-anti" text-anchor="middle">OPPOSING ROTORS BALANCE BODY</text>
            </g>
        </g>
    </g>

    <!-- CONTROLS -->
    <rect x="740" y="110" width="410" height="520" class="panel" />
    <g transform="translate(770, 150)">
        <text id="ctrl-title" x="0" y="0" font-size="22" font-weight="900" fill="#0f172a">Solution: Tail Rotor</text>
        <text id="ctrl-desc" x="0" y="25" font-size="14" fill="#64748b">The classic solution used by most helicopters.</text>

        <!-- Power Slider -->
        <g transform="translate(0, 80)">
            <text x="0" y="0" font-size="15" font-weight="800" fill="#3b82f6">MAIN ROTOR POWER</text>
            <text id="val-power" x="350" y="0" font-size="16" font-weight="800" fill="#1d4ed8" text-anchor="end">40%</text>
            <g transform="translate(0, 15)" onmousedown="startDrag(event, 'power')">
                <line x1="0" y1="0" x2="350" y2="0" class="slider-track" />
                <line id="track-power" x1="0" y1="0" x2="140" y2="0" class="slider-fill" stroke="#3b82f6" />
                <circle id="thumb-power" cx="140" cy="0" r="12" class="slider-thumb" stroke="#3b82f6" />
                <rect x="-10" y="-20" width="370" height="40" class="slider-hitbox" />
            </g>
        </g>

        <!-- Dynamic Control Slider -->
        <g id="sec-slider-group" transform="translate(0, 180)">
            <text id="sec-slider-title" x="0" y="0" font-size="15" font-weight="800" fill="#10b981">TAIL ROTOR THRUST</text>
            <text id="val-sec" x="350" y="0" font-size="16" font-weight="800" fill="#059669" text-anchor="end">0 lbs</text>
            <g transform="translate(0, 15)" onmousedown="startDrag(event, 'secondary')">
                <line x1="0" y1="0" x2="350" y2="0" class="slider-track" />
                <line id="track-sec" x1="0" y1="0" x2="0" y2="0" class="slider-fill" stroke="#10b981" />
                <circle id="thumb-sec" cx="0" cy="0" r="12" class="slider-thumb" stroke="#10b981" />
                <rect x="-10" y="-20" width="370" height="40" class="slider-hitbox" />
            </g>
        </g>

        <!-- Physics Display -->
        <rect x="0" y="280" width="350" height="160" fill="#f8fafc" stroke="#e2e8f0" rx="8" />
        <text x="15" y="305" font-size="12" font-weight="800" fill="#94a3b8" letter-spacing="1">PHYSICS TELEMETRY</text>
        <text x="15" y="335" font-size="14" font-weight="700" fill="#475569">Total Torque (Action):</text>
        <text id="met-action" x="335" y="335" font-size="16" font-weight="800" fill="#3b82f6" text-anchor="end">400 Nm</text>
        <text x="15" y="365" font-size="14" font-weight="700" fill="#475569">Anti-Torque (Reaction):</text>
        <text id="met-reaction" x="335" y="365" font-size="16" font-weight="800" fill="#10b981" text-anchor="end">0 Nm</text>
        <text x="15" y="405" font-size="14" font-weight="700" fill="#475569">Fuselage State:</text>
        <text id="met-state" x="335" y="405" font-size="16" font-weight="900" fill="#ef4444" text-anchor="end">SPINNING</text>
    </g>

    <!-- INFO PANEL -->
    <rect x="50" y="650" width="1100" height="150" class="panel" />
    <foreignObject x="80" y="675" width="1040" height="110">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Segoe UI', Roboto, sans-serif;">
            <div style="display: flex; align-items: center; margin-bottom: 10px;">
                <span id="info-badge" style="background-color: #ef4444; color: white; padding: 4px 12px; border-radius: 6px; font-weight: 800; font-size: 14px; margin-right: 15px; letter-spacing: 0.5px; text-transform: uppercase;">ANTI-TORQUE SOLUTION</span>
                <h3 id="info-title" style="margin: 0; font-size: 22px; font-weight: 800; color: #0f172a;">Conventional Tail Rotor</h3>
            </div>
            <p id="info-desc" style="margin: 0; font-size: 16px; color: #475569; line-height: 1.5;">
                A single main rotor spins, creating torque that wants to spin the body. A small vertical rotor on the tail pushes sideways to create a counter-force. This system is simple but consumes up to 20% of the engine's power.
            </p>
        </div>
    </foreignObject>

    <script type="text/javascript">
        <![CDATA[
        let mode = 'tail';
        let state = { power: 40, secondary: 0 };
        let activeSlider = null;
        let lastTime = 0;
        let mainAngle = 0; let secAngle = 0; let bodyAngle = 0; let bodyVel = 0;

        const modes = {
            tail: { title: 'Solution: Tail Rotor', desc: 'The most common configuration.', slider: 'TAIL THRUST', info: 'Simple but inefficient; the tail rotor uses power without providing any lift.' },
            coaxial: { title: 'Solution: Coaxial Rotors', desc: 'Stacked counter-rotating rotors.', slider: 'AUTO-BALANCED', info: 'Eliminates torque entirely within the mast. Compact and stable, common in naval helicopters.' },
            tandem: { title: 'Solution: Tandem Rotors', desc: 'Front and rear counter-rotating rotors.', slider: 'AUTO-BALANCED', info: 'Two huge rotors cancel each other out. This allows for massive lifting power, like the CH-47 Chinook.' }
        };

        function initSimulation() { setMode('tail'); requestAnimationFrame(loop); }

        function setMode(m) {
            mode = m; bodyAngle = 0; bodyVel = 0;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+m).classList.add('active');
            ['tail', 'coaxial', 'tandem'].forEach(v => document.getElementById('view-'+v).style.display = v===m?'block':'none');
            
            const d = modes[m];
            document.getElementById('ctrl-title').textContent = d.title;
            document.getElementById('ctrl-desc').textContent = d.desc;
            document.getElementById('sec-slider-title').textContent = d.slider;
            document.getElementById('info-title').textContent = d.title;
            document.getElementById('info-desc').textContent = d.info;
            document.getElementById('sec-slider-group').style.opacity = m==='tail'? 1 : 0.3;
            updateVisuals();
        }

        function startDrag(e, id) { activeSlider = id; updateDrag(e); }
        function onMouseMove(e) { if(activeSlider) updateDrag(e); }
        function onMouseUp() { activeSlider = null; }

        function updateDrag(e) {
            const svg = document.getElementById('main-svg');
            const pt = svg.createSVGPoint(); pt.x = e.clientX; pt.y = e.clientY;
            const p = pt.matrixTransform(svg.getScreenCTM().inverse());
            let x = Math.max(0, Math.min(350, p.x - 770));
            state[activeSlider==='power'?'power':'secondary'] = x/350 * (activeSlider==='power'?100:800);
            document.getElementById('track-'+(activeSlider==='power'?'power':'sec')).setAttribute('x2', x);
            document.getElementById('thumb-'+(activeSlider==='power'?'power':'sec')).setAttribute('cx', x);
            updateVisuals();
        }

        function updateVisuals() {
            document.getElementById('val-power').textContent = Math.round(state.power)+'%';
            document.getElementById('val-sec').textContent = mode==='tail'?Math.round(state.secondary)+' lbs' : 'N/A';
            const t = state.power * 10;
            document.getElementById('met-action').textContent = Math.round(t) + ' Nm';
            const r = mode==='tail'? state.secondary * 2.5 : t;
            document.getElementById('met-reaction').textContent = Math.round(r) + ' Nm';
            if(mode==='tail') document.getElementById('vec-tail-force').setAttribute('y2', -state.secondary/10);
        }

        function loop(ts) {
            const dt = (ts - (lastTime||ts))/16; lastTime = ts;
            const t = state.power * 10; const r = mode==='tail'? state.secondary * 2.5 : t;
            bodyVel += (t - r) * 0.001 * dt; bodyVel *= Math.pow(0.96, dt); bodyAngle += bodyVel * dt;
            
            const hGroup = document.getElementById('heli-'+mode+'-group');
            if(hGroup) hGroup.setAttribute('transform', `rotate(${bodyAngle})`);

            mainAngle = (mainAngle + (state.power*0.5 + 2)*dt)%360;
            secAngle = (secAngle - (state.power*0.5 + 2)*dt)%360;
            
            if(mode==='tail') {
                document.getElementById('main-rotor-tail').setAttribute('transform', `rotate(${mainAngle})`);
                const s = Math.cos(secAngle*0.1);
                document.getElementById('tail-rotor-anim').setAttribute('transform', `translate(-222,0) scale(1,${s})`);
            } else if(mode==='coaxial') {
                document.getElementById('rotor-coax-1').setAttribute('transform', `rotate(${mainAngle})`);
                document.getElementById('rotor-coax-2').setAttribute('transform', `rotate(${secAngle})`);
            } else {
                document.getElementById('rotor-tan-front').setAttribute('transform', `rotate(${secAngle})`);
                document.getElementById('rotor-tan-rear').setAttribute('transform', `rotate(${mainAngle})`);
            }

            const sText = document.getElementById('met-state');
            if(Math.abs(bodyVel) < 0.1) { sText.textContent="STABLE"; sText.setAttribute('fill','#10b981'); }
            else { sText.textContent="SPINNING"; sText.setAttribute('fill','#ef4444'); }
            requestAnimationFrame(loop);
        }
        ]]>
    </script>
</svg>
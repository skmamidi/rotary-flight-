<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Drill - Rotary Flight Mission</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/themes.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/quiz.css">
</head>
<body class="theme-olympiad">
  <div class="page-wrapper">
    <nav class="top-nav sticky-nav" id="top-nav"></nav>
    <div class="breadcrumbs" id="breadcrumbs"></div>
    <main class="main-content" id="main-content">
      <section class="hero hero-page">
        <div class="container hero-inner">
          <div class="hero-icon">🧠</div>
          <div>
            <h1>Vocabulary Drill</h1>
            <p class="lead">Rapid recall of rotary flight terms.</p>
            <div class="hero-meta">
              <span class="tag tag-olympiad">Olympiad</span>
              <span class="tag" style="background:var(--soft-background);color:var(--steel-gray)">⏱ 5 min</span>
            </div>
          </div>
        </div>
      </section>
      <div class="container section">
        <div class="topic-layout">
          <aside id="side-nav"></aside>
          <div>
            <div class="callout callout-mission">
              <div class="callout-icon">🎯</div>
              <div><strong>Why this matters</strong><p class="mt-2">Precise vocabulary is essential for competition success. This drill cycles through key terms quickly.</p></div>
            </div>
            <div id="vocab-drill-container" class="mt-5"></div>
          </div>
        </div>
      </div>
    </main>
    <footer class="page-footer">
      <div class="container flex justify-between items-center flex-wrap gap-3">
        <div>Rotary Flight Mission</div>
        <div class="flex gap-4"><a href="../../index.html">Home</a><a href="../../study-path.html">Study Path</a></div>
      </div>
    </footer>
  </div>
  <script src="../../assets/js/app-shell.js"></script>
  <script src="../../assets/js/navigation.js"></script>
  <script src="../../assets/js/progress.js"></script>
  <script src="../../assets/js/glossary.js"></script>
  <script src="../../assets/js/quizzes.js"></script>
  <script src="../../assets/js/accessibility.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Navigation.renderTopicFooter('vocabulary-drill');
      await Glossary.load();
      const allTerms = Object.entries(Glossary.terms);
      // Shuffle terms for variety
      const terms = allTerms.sort(() => Math.random() - 0.5);
      let idx = 0, score = 0, known = 0;
      const container = document.getElementById('vocab-drill-container');
      function render() {
        if (idx >= terms.length) {
          container.innerHTML = `
            <div class="card text-center">
              <h3>🎉 Drill Complete!</h3>
              <p class="mt-3">You knew <strong>${known}</strong> out of <strong>${terms.length}</strong> terms.</p>
              <div class="flex justify-center gap-3 mt-4">
                <button class="btn btn-primary" onclick="location.reload()">Retry</button>
              </div>
            </div>`;
          if (known === terms.length) App.addXP(25);
          return;
        }
        const [term, info] = terms[idx];
        container.innerHTML = `
          <div class="card text-center">
            <div style="font-size:3rem;margin-bottom:var(--space-3)">${info.icon || '🔤'}</div>
            <h2 style="text-transform:capitalize">${term}</h2>
            <div class="mt-4" style="max-width:600px;margin-left:auto;margin-right:auto">
              <p style="font-size:1.1rem"><strong>Definition:</strong> ${info.def}</p>
              <p class="mt-3 caption"><strong>Competition tip:</strong> ${info.comp}</p>
              <p class="mt-3 caption"><em>Example: ${info.example}</em></p>
            </div>
            <div class="flex justify-center gap-3 mt-5">
              <button class="btn btn-secondary" id="skip-vocab">Don't Know →</button>
              <button class="btn btn-primary" id="know-vocab">I Know It ✅</button>
            </div>
            <div class="caption mt-3">Term ${idx + 1} of ${terms.length}</div>
          </div>
        `;
        document.getElementById('skip-vocab').addEventListener('click', () => { idx++; render(); });
        document.getElementById('know-vocab').addEventListener('click', () => { known++; score++; idx++; render(); });
      }
      render();
    });
  </script>
</body>
</html>

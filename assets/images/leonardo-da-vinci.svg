<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="100%" height="100%">
    <defs>
        <!-- Gradients and Patterns -->
        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f0ece6" />
            <stop offset="100%" stop-color="#dcd5cc" />
        </linearGradient>
        
        <linearGradient id="robe-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4a2522" />
            <stop offset="100%" stop-color="#2a1210" />
        </linearGradient>

        <linearGradient id="tunic-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#5c4a3d" />
            <stop offset="100%" stop-color="#3b2e25" />
        </linearGradient>

        <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-gradient)" />
    
    <!-- Vintage Border -->
    <rect x="20" y="20" width="560" height="660" fill="none" stroke="#c0b5a7" stroke-width="2" />
    <rect x="28" y="28" width="544" height="644" fill="none" stroke="#c0b5a7" stroke-width="1" />

    <!-- Subtle Background Watermark (Aerial Screw Abstract Silhouette) -->
    <g opacity="0.06" stroke="#1a1c1e" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(100, 150) scale(0.6)">
        <ellipse cx="300" cy="400" rx="150" ry="30" />
        <path d="M 150,400 C 150,420 450,420 450,400" />
        <line x1="300" y1="50" x2="300" y2="400" />
        <!-- Linen Spiral Abstractions -->
        <path d="M 300,320 C 150,300 150,220 300,200 C 420,180 450,200 450,220 C 450,260 300,300 300,320 Z" />
        <path d="M 300,220 C 450,200 450,120 300,100 C 180,80 150,100 150,120 C 150,160 300,200 300,220 Z" />
        <line x1="300" y1="50" x2="150" y2="120" stroke-dasharray="8 8" />
        <line x1="300" y1="50" x2="450" y2="120" stroke-dasharray="8 8" />
    </g>

    <!-- PORTRAIT GROUP -->
    <g filter="url(#drop-shadow)" transform="translate(0, 10)">
        
        <!-- Robes Shoulders & Torso -->
        <path d="M 50,700 L 130,560 C 160,520 220,520 250,560 L 300,680 L 350,560 C 380,520 440,520 470,560 L 550,700 Z" fill="url(#robe-gradient)"/>
        
        <!-- Robe Folds & Shadows -->
        <path d="M 250,560 L 300,700 L 100,700 L 130,560 Z" fill="#1c0b0a" opacity="0.5"/>
        <path d="M 350,560 L 300,700 L 500,700 L 470,560 Z" fill="#1c0b0a" opacity="0.5"/>
        <path d="M 200,600 L 280,700 L 150,700 Z" fill="#240f0d"/>
        <path d="M 400,600 L 320,700 L 450,700 Z" fill="#240f0d"/>

        <!-- Inner Tunic -->
        <path d="M 250,560 L 300,680 L 350,560 C 320,530 280,530 250,560 Z" fill="url(#tunic-gradient)"/>
        <path d="M 270,550 L 300,600 L 330,550 Z" fill="#2a201a"/> <!-- Deep shadow at neck -->

        <!-- Neck -->
        <rect x="250" y="500" width="100" height="70" fill="#c79172"/>
        <rect x="250" y="500" width="100" height="70" fill="#a87053" opacity="0.6"/> <!-- Deep neck shadow -->

        <!-- Face Base Silhouette -->
        <path d="M 210,340 C 210,500 240,550 300,560 C 360,550 390,500 390,340 C 390,200 370,160 300,160 C 230,160 210,200 210,340 Z" fill="#e6b999"/>

        <!-- Ears -->
        <path d="M 210,360 C 180,360 170,400 180,440 C 190,460 210,450 210,430 Z" fill="#c79172"/>
        <path d="M 390,360 C 420,360 430,400 420,440 C 410,460 390,450 390,430 Z" fill="#c79172"/>

        <!-- Long Sweeping Hair (Renaissance Style) -->
        <!-- Hair Back/Base -->
        <path d="M 195,350 C 150,450 140,550 170,620 C 190,560 180,450 210,380 Z" fill="#c8cacc"/>
        <path d="M 405,350 C 450,450 460,550 430,620 C 410,560 420,450 390,380 Z" fill="#c8cacc"/>
        <!-- Hair Top & Front -->
        <path d="M 195,350 C 180,200 230,130 300,130 C 370,130 420,200 405,350 C 390,240 360,180 300,180 C 240,180 210,240 195,350 Z" fill="#e8e9ea"/>
        <!-- Hair Texture Lines -->
        <path d="M 240,190 C 260,160 290,150 330,160" stroke="#a0a4a8" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M 220,230 C 240,190 280,170 320,185" stroke="#a0a4a8" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 170,400 C 150,480 160,520 180,580" stroke="#a0a4a8" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 430,400 C 450,480 440,520 420,580" stroke="#a0a4a8" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- Long Flowing Beard -->
        <!-- Beard Base/Shadow -->
        <path d="M 210,440 C 160,560 210,680 300,700 C 390,680 440,560 390,440 C 370,500 330,520 300,520 C 270,520 230,500 210,440 Z" fill="#c8cacc"/>
        <!-- Beard Main Highlight -->
        <path d="M 220,460 C 180,560 230,660 300,680 C 370,660 420,560 380,460 C 350,510 320,530 300,530 C 280,530 250,510 220,460 Z" fill="#e8e9ea"/>
        <!-- Beard Texture Waves -->
        <path d="M 250,510 C 230,560 250,620 300,660" stroke="#bdc3c7" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 350,510 C 370,560 350,620 300,660" stroke="#bdc3c7" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 280,530 C 270,580 280,630 300,670" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M 320,530 C 330,580 320,630 300,670" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>

        <!-- Structural Face Shadows (Aging, Deep Features) -->
        <path d="M 210,370 C 240,430 250,480 270,520 C 230,480 220,420 210,370 Z" fill="#c79172"/>
        <path d="M 390,370 C 360,430 350,480 330,520 C 370,480 380,420 390,370 Z" fill="#c79172"/>
        <!-- Deep cheek hollows -->
        <path d="M 230,420 C 260,440 260,460 270,480 C 240,450 240,430 230,420 Z" fill="#a87053" opacity="0.6"/>
        <path d="M 370,420 C 340,440 340,460 330,480 C 360,450 360,430 370,420 Z" fill="#a87053" opacity="0.6"/>

        <!-- Forehead Wrinkles -->
        <path d="M 250,230 Q 300,240 350,230" stroke="#c79172" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 240,250 Q 300,265 360,250" stroke="#c79172" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M 250,270 Q 300,285 350,270" stroke="#c79172" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Nose (Prominent, Slightly Hooked) -->
        <path d="M 300,310 L 275,450 C 275,480 325,480 325,450 L 300,310 Z" fill="#c79172"/>
        <path d="M 300,310 L 290,445 C 290,460 310,460 305,445 L 300,310 Z" fill="#f5cdb1"/>
        <!-- Nostrils -->
        <path d="M 270,455 C 285,450 290,460 285,470 C 270,470 260,460 270,455 Z" fill="#a87053"/>
        <path d="M 330,455 C 315,450 310,460 315,470 C 330,470 340,460 330,455 Z" fill="#a87053"/>

        <!-- Eyes (Deep Set, Intense) -->
        <!-- Sockets -->
        <ellipse cx="255" cy="345" rx="30" ry="18" fill="#a87053" opacity="0.5"/>
        <ellipse cx="345" cy="345" rx="30" ry="18" fill="#a87053" opacity="0.5"/>
        
        <!-- Sclera -->
        <path d="M 230,350 C 255,335 275,350 260,360 C 245,365 230,355 230,350 Z" fill="#e0e4e8"/>
        <path d="M 370,350 C 345,335 325,350 340,360 C 355,365 370,355 370,350 Z" fill="#e0e4e8"/>
        
        <!-- Irises & Pupils (Piercing grey-blue) -->
        <circle cx="252" cy="348" r="7" fill="#5b6d7a"/>
        <circle cx="348" cy="348" r="7" fill="#5b6d7a"/>
        <circle cx="252" cy="348" r="3.5" fill="#1a1c1e"/>
        <circle cx="348" cy="348" r="3.5" fill="#1a1c1e"/>
        
        <!-- Eye Highlights -->
        <circle cx="254" cy="345" r="2" fill="#ffffff"/>
        <circle cx="350" cy="345" r="2" fill="#ffffff"/>
        
        <!-- Heavy Upper Eyelid Folds -->
        <path d="M 220,330 C 250,315 280,330 290,345" stroke="#a87053" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M 380,330 C 350,315 320,330 310,345" stroke="#a87053" stroke-width="4" fill="none" stroke-linecap="round"/>

        <!-- Thick, Bushy White Eyebrows -->
        <path d="M 210,320 C 240,300 275,310 290,330" stroke="#e8e9ea" stroke-width="12" stroke-linecap="round" fill="none"/>
        <path d="M 210,320 C 240,300 275,310 290,330" stroke="#bdc3c7" stroke-width="5" stroke-linecap="round" fill="none"/>
        <path d="M 390,320 C 360,300 325,310 310,330" stroke="#e8e9ea" stroke-width="12" stroke-linecap="round" fill="none"/>
        <path d="M 390,320 C 360,300 325,310 310,330" stroke="#bdc3c7" stroke-width="5" stroke-linecap="round" fill="none"/>

        <!-- Crows Feet & Heavy Aging Lines -->
        <path d="M 220,355 C 210,360 210,370 225,375" stroke="#c79172" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M 380,355 C 390,360 390,370 375,375" stroke="#c79172" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- Nasolabial Folds (Deep) -->
        <path d="M 260,420 C 250,450 245,470 250,490" stroke="#a87053" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M 340,420 C 350,450 355,470 350,490" stroke="#a87053" stroke-width="3.5" fill="none" stroke-linecap="round"/>

        <!-- Mustache (Blending into beard) -->
        <path d="M 250,490 C 280,480 320,480 350,490 C 360,510 335,520 300,510 C 265,520 240,510 250,490 Z" fill="#e8e9ea"/>
        <path d="M 270,490 L 265,510 M 290,485 L 285,510 M 310,485 L 315,510 M 330,490 L 335,510" stroke="#bdc3c7" stroke-width="2" stroke-linecap="round" fill="none"/>

        <!-- Hint of Dark Lips beneath mustache -->
        <path d="M 275,515 C 300,525 320,515 300,510 Z" fill="#a87053"/>
    </g>

    <!-- Nameplate / Title -->
    <g transform="translate(0, 20)">
        <!-- Elegant separator line -->
        <line x1="200" y1="590" x2="400" y2="590" stroke="#ffffff" stroke-width="1" opacity="0.3" />
        
        <!-- Text -->
        <text x="300" y="625" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="6">LEONARDO DA VINCI</text>
        <text x="300" y="645" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle" letter-spacing="3">1452 - 1519</text>
    </g>

</svg>
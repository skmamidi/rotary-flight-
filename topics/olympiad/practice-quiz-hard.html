<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Quiz: Hard - Rotary Flight Mission</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/themes.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
  <link rel="stylesheet" href="../../assets/css/quiz.css">
</head>
<body class="theme-olympiad">
  <div class="page-wrapper">
    <nav class="top-nav sticky-nav" id="top-nav"></nav>
    <div class="breadcrumbs" id="breadcrumbs"></div>
    <main class="main-content" id="main-content">
      <section class="hero hero-page">
        <div class="container hero-inner">
          <div class="hero-icon">📝</div>
          <div>
            <h1>Practice Quiz: Hard</h1>
            <p class="lead">Tight wording, deep thinking, and elimination skills.</p>
            <div class="hero-meta">
              <span class="tag tag-advanced">Advanced</span>
              <span class="tag" style="background:var(--soft-background);color:var(--steel-gray)">⏱ 20 min</span>
            </div>
          </div>
        </div>
      </section>
      <div class="container section">
        <div class="topic-layout">
          <aside id="side-nav"></aside>
          <div>
            <div class="callout callout-mission">
              <div class="callout-icon">🎯</div>
              <div><strong>Why this matters</strong><p class="mt-2">Hard quizzes test your ability to eliminate wrong answers and reason through complex scenarios.</p></div>
            </div>
            <div class="quiz-container" id="quiz-container" data-quiz-id="practice-quiz-hard"></div>
          </div>
        </div>
      </div>
    </main>
    <footer class="page-footer">
      <div class="container flex justify-between items-center flex-wrap gap-3">
        <div>Rotary Flight Mission</div>
        <div class="flex gap-4"><a href="../../index.html">Home</a><a href="../../study-path.html">Study Path</a></div>
      </div>
    </footer>
  </div>
  <script src="../../assets/js/app-shell.js"></script>
  <script src="../../assets/js/navigation.js"></script>
  <script src="../../assets/js/progress.js"></script>
  <script src="../../assets/js/glossary.js"></script>
  <script src="../../assets/js/quizzes.js"></script>
  <script src="../../assets/js/accessibility.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Navigation.renderTopicFooter('practice-quiz-hard');
      let questions = [];
      try {
        const res = await fetch('../../assets/data/quizzes.json');
        const data = await res.json();
        questions = data['practice-quiz-hard'] || [];
      } catch (e) {
        questions = [
          { question: 'A tiltrotor in forward-flight mode has its nacelles:', type: 'multiple_choice', options: ['Vertical','Horizontal','At 45 degrees','Removed'], correct: 1, explanation: 'Forward flight = horizontal.' },
          { question: 'Yaw, pitch, and roll describe:', type: 'multiple_choice', options: ['Engine types','Aircraft attitude','Weather conditions','Fuel levels'], correct: 1, explanation: 'They describe 3D rotation.' },
          { question: 'Select all that describe an autogyro:', type: 'multiple_choice', options: ['Powered rotor for lift','Unpowered rotor spins from airflow','Needs a propeller for thrust','Can hover like a helicopter'], correct: 1, explanation: 'Autogyros have unpowered rotors.' }
        ];
      }
      QuizEngine.init('quiz-container');
      QuizEngine.loadQuiz(questions);
    });
  </script>
</body>
</html>
